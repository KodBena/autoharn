[intro]
heading = "autoharn setup — guided wizard (tools/setup_tui)"
driver_line = "Driver of existing verbs only: every action below shows the exact command it runs and streams that command's real output. If this process dies mid-flow, you can finish by hand from what was printed."
guarantee_envelope_heading = "Guarantee envelope (structural, per design/FABLE-SETUP-TUI-PURE-CORE-SPEC.md §2.6):"
guarantee_envelope_paragraphs = ["  BEFORE commit: nothing to clean up. Every screen only decides and queues -- kill this process at any point before the final confirm and the destination, your keyring, and every ledger are untouched (verified before/after, WPC1/WPC3).", "  DURING commit: per-act atomicity (each write/command/background-start either fully happens or fully doesn't) plus a durable commit journal in the destination naming which step runs next -- a mid-commit death resumes cleanly on re-entry, or finishes by hand from the journal and the streamed output above it (WPC4).", "  NOT claimed: whole-flow atomicity across Postgres + filesystem + GPG + a background process. Decide-then-commit shrinks the exposure window from the whole session to the commit phase; it does not eliminate it."]
dry_run_notice = "*** --dry-run: NOTHING below is destructive or externally visible. Every act is computed and shown (exact argv, exact file paths + a content summary, exact led rows) but NOT performed -- no file written outside this process, no database act, no led write, no process started, no port bound. Read-only probes (preflight, connection checks, the pg_hba read) stay live. The closing checklist renders these as WOULD-DO. ***"
nav_hint = "Navigate the sidebar tree with the arrow keys or the mouse, in any order -- there is no Back/Next; every section keeps whatever you already typed into it, and the Commit node is reachable, and shows what remains, at any time."
