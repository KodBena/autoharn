why = "maintainer ruling 2026-07-19: every Sonnet build receives a fresh-context adversarial review before acceptance, working from the ratified spec and diff, never the delegate's own report."
citations = ["ledger row 1492", "ledger row 1722 (genericity critique -- generalized from 'kernel-touching' to 'sensitive core or critical path')"]
hydrates = "Durable decision adopted at world birth (fresh-context-review-for-delegated-work, catalog tools/setup_tui/durable_decisions.py, why: ledger rows 1492/1722): delegated work gets a routine, fresh-context, independent review before acceptance; a change touching the project's sensitive core or critical path makes that review MANDATORY; the reviewer works from the ratified spec, the diff, and the witness harness, never the delegate's own self-report, checking for silent narrowing, improvisation, or malicious compliance."
claude_md = "- **Fresh-context review for delegated work** -- delegated work gets a routine, fresh-context, independent review before acceptance; a change touching the project's sensitive core or critical path makes that review MANDATORY, not optional. The reviewer works from the ratified spec, the diff, and the witness harness -- never the delegate's own self-report -- checking specifically for silent narrowing, improvisation, or malicious compliance (ledger row 1492)."

