hydrates = "Durable decision adopted at world birth (claims-carry-witnesses, catalog tools/setup_tui/durable_decisions.py, why: this repo's own CLAUDE.md ORCHESTRATION section + ledger row 1722): every claim in a report states its evidentiary status per item -- WITNESSED (observed output), REFUSED-AS-EXPECTED, or UNEXERCISED (the concrete blocker); docs follow the same rule; no umbrella claims."
claude_md = "- **Claims carry witnesses** -- every claim in a report states its evidentiary status per item: WITNESSED (with the observed output), REFUSED-AS-EXPECTED (a refusal that was the correct outcome), or UNEXERCISED (with the concrete blocker). Docs follow the same rule -- an example carries real output or an UNWITNESSED mark. No umbrella claims covering multiple items at once."

[[decision]]
