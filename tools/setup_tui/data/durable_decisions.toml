claude_md = "- **Unanchored review briefs** -- a review brief hands the reviewer the artifact, the spec, the law, and a refute posture, never a pre-identified list of suspected defects. A reviewer told where to look is confirming a hypothesis, not discovering one; the finding is only as independent as the brief that produced it (ledger row 1278)."

[[decision]]
