# Loaded by tools/setup_tui/durable_decisions.py; validated at import time.
#
# SCHEMA (round-6 restructure, ledger row 1117 -- companion rule C13, law/adr/0019 appendix):
# `why` used to bundle a short rationale AND every citation backing it (ledger rows, file
# pointers, quotes) in ONE semicolon-joined string -- the same class as feature_facts.toml's own
# pipe-flattened aspiration, just a different homemade delimiter. Split: `why` is now ONE short,
# citation-free sentence; `citations` is a list, each entry its own line when rendered (never
# comma/semicolon-joined prose). `rule`/`hydrates`/`claude_md` are UNCHANGED -- they are literal
# artifact TEXT (a ledger-decision statement, a CLAUDE.md fragment), not interactive elucidation
# a Textual widget wraps; restructuring them would change what gets WRITTEN, which is out of this
# round's scope.

[[decision]]
slug = "makespan-scheduling-by-mandate"
rule = "For any commission spanning 3+ work items with dependencies, precedence constraints, or resource conflicts, sequence them with a constraint-based scheduler rather than ad hoc ordering. Require a high-stakes task's decomposition and close to be cosigned by a principal distinct from the one who did the work -- treat an undischarged cosign as a hard block on further edits, never backloggable debt."
why = "maintainer directive 2026-07-14, softly mandating cosigned decomposition for multi-item commissions."
citations = ["user-guide/USER-RECIPES-FAQ.md 'Workflow patterns'", "ledger row 1714 (this catalog's own commission)", "ledger row 1716 (maintainer's correction on the panel's own mandate)", "autoharn-panel CLAUDE.md points 2-3 (RESOURCES table row id=1178)", "ledger row 1722 (genericity critique, entry #1)"]
hydrates = "Durable decision adopted at world birth (makespan-scheduling-by-mandate, catalog tools/setup_tui/durable_decisions.py, why: ledger rows 1714/1716/1722 + autoharn-panel/CLAUDE.md points 2-3 and its RESOURCES table row id=1178): for any commission spanning 3+ work items with dependencies, precedence constraints, or resource conflicts, sequence them with a constraint-based scheduler rather than ad hoc ordering; require a high-stakes task's decomposition and close to be cosigned by a principal distinct from the one who did the work, treating an undischarged cosign as a hard block on further edits, never backloggable debt."
claude_md = "- **Constraint-scheduled, cosigned decomposition** -- for any commission spanning 3+ work items with dependencies, precedence constraints, or resource conflicts, sequence them with a constraint-based scheduler (this harness ships one: `tools/makespan-scheduler/`, CP-SAT via OR-Tools) rather than ad hoc ordering. Require a high-stakes task's decomposition and close to be cosigned by a principal distinct from the one who did the work -- treat an undischarged cosign as a hard block on further edits, never backloggable debt. Full treatment: user-guide/USER-RECIPES-FAQ.md 'Workflow patterns', design/ORCH-MAKESPAN-SCHEDULING-GUARANTEE.md."

