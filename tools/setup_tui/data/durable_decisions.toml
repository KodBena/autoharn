rule = "Every claim in a report states its evidentiary status per item: WITNESSED (with the observed output), REFUSED-AS-EXPECTED (a refusal that was the correct outcome), or UNEXERCISED (with the concrete blocker that stopped you). Docs follow the same rule -- an example carries real output or an UNWITNESSED mark. No umbrella claims covering multiple items at once."
why = "this repo's own CLAUDE.md ORCHESTRATION section, already written project-agnostically."
