claude_md = "- **Claims carry witnesses** -- every claim in a report states its evidentiary status per item: WITNESSED (with the observed output), REFUSED-AS-EXPECTED (a refusal that was the correct outcome), or UNEXERCISED (with the concrete blocker). Docs follow the same rule -- an example carries real output or an UNWITNESSED mark. No umbrella claims covering multiple items at once."

[[decision]]
slug = "unanchored-review-briefs"
rule = "A review brief hands the reviewer the artifact, the spec, the law, and a refute posture -- never a pre-identified list of suspected defects. A reviewer told where to look is confirming a hypothesis, not discovering one; the finding is only as independent as the brief that produced it."
why = "s37's verdict round dispatched unanchored: a fresh reviewer given the diff, spec, and law, never a suspect list."
citations = ["ledger row 1278", "ledger row 1722 (genericity critique, more portable than several entries that made the original cut)"]
hydrates = "Durable decision adopted at world birth (unanchored-review-briefs, catalog tools/setup_tui/durable_decisions.py, why: ledger row 1278): a review brief hands the reviewer the artifact, the spec, the law, and a refute posture -- never a pre-identified suspect list; a reviewer told where to look is confirming a hypothesis, not discovering one."
claude_md = "- **Unanchored review briefs** -- a review brief hands the reviewer the artifact, the spec, the law, and a refute posture, never a pre-identified list of suspected defects. A reviewer told where to look is confirming a hypothesis, not discovering one; the finding is only as independent as the brief that produced it (ledger row 1278)."

[[decision]]
