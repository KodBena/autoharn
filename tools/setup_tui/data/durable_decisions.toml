rule = "A review brief hands the reviewer the artifact, the spec, the law, and a refute posture -- never a pre-identified list of suspected defects. A reviewer told where to look is confirming a hypothesis, not discovering one; the finding is only as independent as the brief that produced it."
why = "ledger row 1278 (this repo): 's37 verdict round dispatched UNANCHORED per row 1276's standing rule: a FRESH reviewer instance..., given the cumulative diff, the spec, the LAW, and the refute posture; no suspect lists from anyone.' Flagged by row 1722's genericity critique as more portable than several entries that made the original cut."
