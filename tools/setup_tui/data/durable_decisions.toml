[[decision]]
slug = "single-branch-authoring"
rule = "Content is authored on the single working branch ONLY; a cut/release branch is a pure derivation (projection), never a place an edit originates. An edit made inside a cut is the defect to make unrepresentable, not a convenience."
why = "maintainer ruling 2026-07-15: ONE branch, full stop -- branches are the transaction-paradigm violation witnessed."
citations = ["ledger row 1033"]
hydrates = "Durable decision adopted at world birth (single-branch-authoring, catalog tools/setup_tui/durable_decisions.py, why: ledger row 1033): content is authored on the single working branch ONLY; a cut/release branch is a pure derivation, never a place an edit originates -- witnessed specimen: v1.1 cut-only edits authored in a cut worktree were silently re-deleted by the next cut."
claude_md = "- **Single-branch authoring** -- content is authored on the single working branch ONLY; a cut/release branch is a pure derivation (projection), never a place an edit originates (ledger row 1033: cut-only edits were silently re-deleted by the next cut)."

[[decision]]
slug = "tags-are-serious-business"
rule = "Public main stays continuously up to date via routinely pushed, UNTAGGED cuts. Tagging is serious business -- a deliberate release act, never done between feature sets."
why = "maintainer ruling 2026-07-15: public main stays continuously up to date via untagged cuts; tagging is a deliberate release act."
citations = ["ledger row 1027"]
hydrates = "Durable decision adopted at world birth (tags-are-serious-business, catalog tools/setup_tui/durable_decisions.py, why: ledger row 1027): public main stays continuously up to date via routinely pushed, UNTAGGED cuts; tagging is a deliberate release act, never done between feature sets."
claude_md = "- **Tags are serious business** -- push public main often, UNTAGGED; a tag is a deliberate release act, never done between feature sets (ledger row 1027)."

[[decision]]
slug = "obligate-amplification-caution"
rule = "Before writing any obligation row into the ledger, know that over-catch review triggers are retroactive with no time bound, and that an obliged actor's own later actions can count as new debt against themselves. Always discharge review obligations under a different principal than the one who is obliged."
why = "the obligate footgun's third witnessed occurrence -- pre-existing rows flagged as debt, then amplified when the obliged actor's own dispositions counted as new debt."
citations = ["ledger row 1640", "ledger row 1722 (genericity critique, entry #5)"]
hydrates = "Durable decision adopted at world birth (obligate-amplification-caution, catalog tools/setup_tui/durable_decisions.py, why: ledger rows 1640/1722): before writing any obligation row into the ledger, know that over-catch review triggers are retroactive with no time bound, and that an obliged actor's own later actions can count as new debt against themselves -- always discharge review obligations under a different principal than the one who is obliged."
claude_md = "- **Obligation-trigger caution** -- before writing any obligation row into the ledger, know that over-catch review triggers are retroactive with no time bound, and that an obliged actor's own later actions can count as new debt against themselves. Always discharge review obligations under a different principal than the one who is obliged (ledger row 1640)."

[[decision]]
slug = "doc-currency-at-the-seam"
rule = "Every merge that changes user-facing behavior includes its documentation update (or a named, tracked deferral with a reason) in the same unit of work. A merge silent on docs for a behavior change is itself a defect."
why = "maintainer-directed 2026-07-19: reduce the vigilance burden of remembering docs after new features land."
citations = ["ledger row 1699", "the 2026-07-18 Block D merge (landed undocumented, needed a dedicated catch-up pass)", "ledger row 1722 (genericity critique, entry #7)"]
hydrates = "Durable decision adopted at world birth (doc-currency-at-the-seam, catalog tools/setup_tui/durable_decisions.py, why: ledger rows 1699/1722): every merge that changes user-facing behavior includes its documentation update, or a named, tracked deferral with a reason, in the same unit of work; a merge silent on docs for a behavior change is itself a defect."
claude_md = "- **Doc currency at the seam** -- every merge that changes user-facing behavior includes its documentation update (or a named, tracked deferral with a reason) in the same unit of work. A merge silent on docs for a behavior change is itself a defect (ledger row 1699)."

[[decision]]
slug = "concurrent-builders-need-isolation"
rule = "Overlapping-surface commissions get worktree isolation or serial dispatch, never a shared checkout -- a concurrent sibling's uncommitted hunk in a shared working tree can be swept into another builder's commit by an ordinary `git add` of a declared path."
why = "s45 adversarial review adjudication: a concurrent builder's uncommitted hunk in a shared file was swept into another builder's commit."
citations = ["ledger row 1502", "commit 94f5b7a (a fixture_census row bundled before those files existed)"]
hydrates = "Durable decision adopted at world birth (concurrent-builders-need-isolation, catalog tools/setup_tui/durable_decisions.py, why: ledger row 1502): overlapping-surface commissions get worktree isolation or serial dispatch, never a shared checkout -- witnessed scope-bleed: a concurrent builder's uncommitted hunk in a shared file was swept into another builder's commit."
claude_md = "- **Concurrent builders need isolation** -- overlapping-surface commissions get worktree isolation or serial dispatch, never a shared checkout (ledger row 1502: a concurrent builder's uncommitted hunk in a shared file was swept into another builder's commit, making a census gate falsely RED)."

[[decision]]
slug = "runs-are-strictly-linear"
rule = "Once a deployment's evidence is recorded, treat it as immutable history -- never patch, refresh, or apply deltas to it after the fact. A needed change is realized only in the next deployment you create."
why = "maintainer ruling 2026-07-11: the apply-to-existing-world ceremony was retired after producing cargo-cult sysadmin work; a run-2 world was itself broken at birth by an unscripted gap."
citations = ["this repo's own CLAUDE.md ORCHESTRATION section", "ledger row 1722 (genericity critique, entry #9)"]
hydrates = "Durable decision adopted at world birth (runs-are-strictly-linear, catalog tools/setup_tui/durable_decisions.py, why: maintainer ruling 2026-07-11 + ledger row 1722): once a deployment's evidence is recorded, treat it as immutable history -- never patch, refresh, or apply deltas to it after the fact; a needed change is realized only in the next deployment you create."
claude_md = "- **Deployments are immutable history once recorded** -- once a deployment's evidence is recorded, treat it as immutable history: never patch, refresh, or apply deltas to it after the fact. A needed change is realized only in the next deployment you create (maintainer ruling 2026-07-11)."

[[decision]]
slug = "decomposition-to-unit-of-independent-resumption"
rule = "Decompose a commission into ledgered work items to the UNIT OF INDEPENDENT RESUMPTION -- not below it and not above it, and no numeric rule (a fixed item- or file-count target is cargo-cultable and wrong as often as right). Judge granularity by one question: could a fresh session pick up this slug alone and know what to build and how to tell it's done?"
why = "an increment left out of the ledger does not exist; too-fine and too-coarse decomposition were both independently witnessed against the same project."
citations = ["autoharn-panel CLAUDE.md point 1 (run-8 finding, 2026-07-11)", "design/ORCH-RETROSPECTIVE-RUN10.md Finding 2"]
hydrates = "Durable decision adopted at world birth (decomposition-to-unit-of-independent-resumption, catalog tools/setup_tui/durable_decisions.py, why: autoharn-panel CLAUDE.md point 1, run-8 finding 2026-07-11 and ORCH-RETROSPECTIVE-RUN10.md Finding 2): decompose a commission to the UNIT OF INDEPENDENT RESUMPTION -- no numeric item/file-count rule; judge by whether a fresh session could pick up the slug alone and know what to build and how to tell it's done."
claude_md = "- **Decompose to the unit of independent resumption** -- not below it, not above it, no numeric item/file-count rule (a fixed target is cargo-cultable and wrong as often as right). Judge by one question: could a fresh session pick up this slug alone and know what to build and how to tell it's done? (autoharn-panel prior art, CLAUDE.md point 1: too fine adds ledger ceremony with no resumability gain, run10; too coarse hides a seam a successor could have picked up separately, run-8.)"

[[decision]]
