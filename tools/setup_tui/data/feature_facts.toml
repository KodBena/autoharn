# tools/setup_tui/data/feature_facts.toml -- feature-facts registry (ADR-0012 P10 data file).
# Loaded by tools/setup_tui/feature_facts.py; validated at import time.
#
# SCHEMA (round 7, ledger row 1119 -- following an independent Fable RCA consult,
# design/CONSULT-FABLE-ELUCIDATION-RCA-2026-07-22.md; supersedes round 6's aspiration/standards/
# mechanism/external four-slot vocabulary, which the consult diagnosed as CRITICAL: fielding a
# standard's name into a dedicated `standards` slot silently PROMOTED an aspiration ("aspires to
# this standard's decomposition") into an unqualified conformance claim -- a truth-value change,
# not a formatting one, on the exact screen that teaches new adopters what the system is):
#
#   lead            -- decision-guidance prose (what choosing/having this costs, requires, or
#                       changes for the operator), written as a sentence. A standard this feature
#                       ASPIRES to (never CONFORMS to) is named INSIDE this sentence with its
#                       qualifying hedge intact ("aspires to X's own decomposition") -- there is
#                       NO separate standards slot to strip that hedge into. Empty = nothing to
#                       say (an empty slot renders NO line at all, never "none named").
#   external        -- ONE meaning only: a concrete external PREREQUISITE or STANDING OBLIGATION
#                       the operator must supply or keep (a binary on PATH, a live cluster, a
#                       recurring process) -- never what the feature does internally. Empty = none.
#   provenance      -- OPTIONAL list of citations a FOUNDING OPERATOR could actually open and read
#                       (this repo's own user-guide/*, or law/adr/ itself) -- rendered demoted,
#                       LAST, as "Full basis: <path>".
#   maintainer_refs -- OPTIONAL list of INTERNAL-ONLY citations (ledger rows, design/FABLE-*/
#                       design/MAINT-* build-basis docs, kernel lineage SQL files) -- NEVER
#                       rendered by any widget; kept only for the maintainer's own audit trail
#                       (this round's own build report names every fact's own sourcing).

