# tools/setup_tui/data/feature_facts.toml -- feature-facts registry (ADR-0012 P10 data file).
# Loaded by tools/setup_tui/feature_facts.py; validated at import time.
#
# SCHEMA (round-6 restructure, ledger row 1117 -- companion rule C13, law/adr/0019 appendix:
# "content is typed semantic elements; no layout carried inside a string"). Each entry:
#   key         -- identifier (unchanged)
#   label       -- human label (unchanged)
#   aspiration  -- ONE short prose sentence: the standards-conformance AIM, citation-free, or the
#                  honest "none named" statement (kept explicit -- an absence stated plainly is
#                  itself informative, ADR-0002 rule 2's own carve-out).
#   standards   -- OPTIONAL list of named external standards/frameworks the aspiration cites
#                  (e.g. "NIST SP 800-63"); empty/omitted when none are named.
#   mechanism   -- OPTIONAL list of file-path/ledger-row citations that GROUND the aspiration or
#                  external claim (design docs, kernel lineage files, gates, ledger rows) -- each
#                  renders as its OWN line (paths are data, never comma-joined prose).
#   external    -- ONE short prose sentence: the external cost/dependency, citation-free, or
#                  "none" stated explicitly.
# Previously, `aspiration`/`external` bundled BOTH the prose claim AND its own citations in one
# string (e.g. signed_genesis's own aspiration ran four independent clauses -- a standards claim,
# two file citations, a ledger-row citation -- joined by connectives); the renderer then joined
# `aspiration`/`external` themselves with a homemade ' | ' separator for the one-line `.line()`
# checklist format, which a ROUND-5 rendering mistake (using `.line()` as elucidation PROSE
# instead of a tabular info-line) exposed as a literal pipe visible mid-wrapped-paragraph. Both
# axes are fixed here: citations move to `standards`/`mechanism` (never re-flattened into prose),
# and `.line()` (unchanged, still the tabular/log-line renderer) is no longer used as elucidation
# anywhere -- `feature_facts.FeatureFact.elements()` is the new, typed accessor for that.
#
# Stale citations found and fixed in the same sweep (mother's-house rule -- a hazard within
# reach): several `mechanism` paths named `tools/setup_tui/screens.py screen_X` and
# `tools/setup_tui/ui_textual.py`/`--plain`/`--scripted` -- all deleted in the 2026-07-22
# wholesale rebuild. Updated to the current module names (`steps_*.py`, `tools/configtree/`).

