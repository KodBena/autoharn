# Specimen C -- transcribed from the autoharn-panel deployment's hand-built workflow template,
# scripts/cycle-workflow-template.mjs (~/w/vdc/1/experience/autoharn-panel/scripts/), the
# deployment's own answer to the gap this exploration names: "a deployment inventing, from
# scratch, the primitive the harness lacks" (design/FABLE-PIPELINE-DSL-EXPLORATION.md, "The
# problem"). This is NOT a live-run ledger specimen like A and B above -- it is a runnable
# JavaScript template a caller invokes with args (repoRoot, adrPaths, a precomputed
# makespan-scheduler schedule, and per-job specs).
#
# THIS SPECIMEN DOES NOT FIT v0'S GRAMMAR CLEANLY. The template's compliance-review phase is a
# BOUNDED RETRY LOOP (`while (true) { ... if (round >= MAX_COMPLIANCE_ROUNDS) break }`, capped at
# 2 rounds, each round re-prompting with every prior round's review+countersign text serialized
# in) -- a real loop construct, which the exploration doc explicitly rules out of v0 ("Not a
# workflow engine. No conditionals, no loops, no expressions."). What is transcribed below is
# only the phase/role/convergence/landing-zone SHAPE the loop converges toward or escalates from
# -- never the loop's own retry mechanics, which stay orchestrator/script code per the doc's own
# boundary. See design/workflows/README.md "Known misfits" for the verbatim record of this gap.
# The template's `implement` phase's own internal parallel-batch-over-a-precomputed-schedule
# mechanics are the same kind of omission, for the same reason (that is scheduling, not ordering
# -- explicitly out of scope per the doc's "Not a scheduler" section).

[[phases]]
name = "implement"
depends_on = []

[[phases]]
name = "compliance-review"
depends_on = ["implement"]

[[phases]]
name = "compliance-countersign"
depends_on = ["compliance-review"]

[roles.implement]
implements = "sonnet, one agent() call per scheduled job id, dispatched in parallel per makespan-scheduler batch"

[roles.compliance-review]
authors = "sonnet, one fresh agent() call reviewing the entire cycle's diff against ADR-0000/0012/0013"

[roles.compliance-countersign]
reviews = "sonnet, one fresh agent() call auditing the review itself for misattribution, not re-reviewing the diff from scratch"

[convergence.implement]
done = "every scheduled job id in every batch resolves without throwing/rejecting; a batch with any failed job id aborts the whole workflow rather than continuing on a partial result set (the template's own explicit design choice, since parallel()'s contract would otherwise silently resolve a thrown/rejected thunk to null)."
escalation_event = "workflow abort with the failed job id(s) named -- the template throws rather than continuing, which routes control back to the orchestrator that invoked the workflow; it is not itself a maintainer-facing typed event, since the template predates this DSL."

[convergence.compliance-review]
done = "a structured review object (REVIEW_SCHEMA: per-ADR verdicts, cited violations, refactor_warranted/description) is produced for the round."
escalation_event = "none directly -- convergence is judged one phase later, by compliance-countersign's verdict on THIS phase's output; see that phase's escalation_event for the actual typed event."

[convergence.compliance-countersign]
done = "the countersigner's verdict is CONFIRM or CONFIRM_WITH_CORRECTIONS (not REJECT) within MAX_COMPLIANCE_ROUNDS=2 rounds -- the template's own bounded review<->countersign loop, which this v0 grammar cannot express as a mechanism (see the header comment above and the README's Known misfits)."
escalation_event = "non-converging-review-loop -- 'compliance review did NOT converge after 2 rounds -- stopping, not looping further; this escalates to the orchestrator to adjudicate rather than a silent 3rd automated round' (the template's own log message, cycle-workflow-template.mjs line 174), the exact typed event this project's orchestration contract (CLAUDE.md) already names."

[landing_zones.implement]
zone = "each scheduled job's own destination, per its spec -- the template does not fix one (specs are supplied by the caller per job); results are held in the workflow's in-memory `results` object and returned to the invoker at the end of the run."

[landing_zones.compliance-review]
zone = "held in-memory as part of `complianceRounds`, returned in the workflow's final result object (`finalReview`); no independent ledger/file landing zone in the template as written."

[landing_zones.compliance-countersign]
zone = "held in-memory as part of `complianceRounds`, returned in the workflow's final result object (`finalCountersign`, `converged`); no independent ledger/file landing zone in the template as written -- a gap the README's Known misfits section also notes, since ADR-0017's fresh-context loop (a close relative of this phase) DOES mandate a landing zone (attestations/doc-legibility-attestations.jsonl) that this earlier template predates."
