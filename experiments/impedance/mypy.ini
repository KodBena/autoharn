# mypy --strict gate for the `impedance` package (ADR-0000: the four impedances must be
# UNCONSTRUCTABLE — a mypy error, not a lint; ADR-0012 P8: the typed signature is the contract
# SSOT). The core + every adapter + the mediated demo (demo/pipeline.py, demo/raw_pipeline.py)
# must be strict-clean. demo/mismatches.py is DELIBERATELY excluded here: it is the negative
# fixture (five non-building crossings), checked by tests/test_mismatches_dont_typecheck.py,
# which runs mypy on it ALONE and asserts the predicted error codes fire.
#
#   run from experiments/impedance/:  python -m mypy --config-file mypy.ini
[mypy]
strict = True
mypy_path = .
files = impedance, demo/pipeline.py, demo/raw_pipeline.py
# the negative fixture is checked by its own test, not the clean gate
exclude = demo/mismatches\.py

# scipy ships no py.typed / stubs for `scipy.special` — a genuine stub-gap, NAMED here (P8's
# named-relaxation posture), never a blanket ignore. The scipy adapter's own signatures are fully
# typed on the host carrier; only the upstream `scipy.special.*` symbols are untyped.
[mypy-scipy.*]
ignore_missing_imports = True

# sklearn (the optional 5th adapter) ships py.typed but some submodule symbols are loosely typed;
# named here so the optional adapter checks clean without weakening the core gate.
[mypy-sklearn.*]
ignore_missing_imports = True
