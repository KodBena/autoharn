# mypy --strict gate for nla_lab (ADR-0012 P8: the typed signature is the contract's
# SSOT; ratchets the by-type conformance the 8 parallel impls build on — B2/B3).
#   run from fact-mining/:  MYPYPATH=. python -m mypy --config-file nla_lab/mypy.ini nla_lab
#
# `jax` is REAL here (it ships py.typed): the contract's `encode` signature is
# genuinely `jax.Array`-typed, not Any. The NAMED RELAXATIONS are the pre-existing
# UNTYPED local workspace deps (jax_deberta/shape_buckets/spans/deberta_weights),
# skipped per the P8 named-stub-gap posture + ADR-0004 no-retroactive-sweep — they are
# not nla_lab's to retype. Every skip is a declared gap, never a blanket convenience.
[mypy]
strict = True
mypy_path = .
# default target so `python -m mypy --config-file nla_lab/mypy.ini` (no explicit path,
# run from fact-mining/) checks the package; an explicit path argument overrides this.
files = nla_lab

[mypy-jax_deberta]
follow_imports = skip

[mypy-shape_buckets]
follow_imports = skip

[mypy-spans]
follow_imports = skip

[mypy-deberta_weights]
follow_imports = skip
