# mypy --strict gate for the adjudicate package (ADR-0012 P8: the typed signature is
# the contract's SSOT; ADR-0000: illegal states unrepresentable, checked here).
#   run from experiments/adjudicate/:
#     MYPYPATH=. python -m mypy --config-file mypy.ini .
#
# textual and SQLAlchemy BOTH ship py.typed and are checked for real (no blanket
# ignore — P8 forbids silencing a typed library). There are NO named relaxations:
# the package is self-contained over stdlib + two fully-typed deps.
[mypy]
strict = True
mypy_path = .
files = .
exclude = (^|/)(\.mypy_cache|\.pytest_cache|__pycache__)/
